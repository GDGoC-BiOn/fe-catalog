# fe-catalog (remote) — served behind the LB under /fe-catalog/.
# Same-origin with the host (via the LB), so NO CORS headers are needed.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # Module Federation entry — must not be cached stale, or the host keeps
    # loading an old remote after a deploy.
    location = /fe-catalog/remoteEntry.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed build assets are content-addressed → cache forever.
    location /fe-catalog/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /fe-catalog/ {
        try_files $uri $uri/ /fe-catalog/index.html;
    }
}
